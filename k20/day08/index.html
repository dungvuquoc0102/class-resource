<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Day 8</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Open Sans", sans-serif;
        font-weight: 400;
      }
      h1 {
        font-size: 100px;
        font-weight: bolder;
        line-height: 2.5;
        text-align: center;
        color: rgb(4 207 98);
      }
      .container {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(3, 1fr);
        gap: 15px;
        /* justify-items: center;
        align-items: center; */
        /* justify-content: center;
        align-content: center; */
        /* grid-auto-flow: dense; */
        margin-inline: 50px;
        /* height: 200px; */
      }
      .item {
        /* width: 100px; */
        /* aspect-ratio: 3/2; */
        position: relative;
        border-radius: 15px;
        overflow: hidden;

        img {
          display: block;
          width: 100%;
          height: 100%;
          object-fit: cover;
        }

        span {
          position: absolute;
          color: white;
          font-size: 24px;
          font-weight: bold;
          left: 50%;
          top: 50%;
          transform: translate(-50%, -50%);
        }
      }
      .item-2 {
        /* width: 100px; */
        grid-column: 2 / 4;
        aspect-ratio: 6 / 2;
        width: 100px;
        height: 50px;
        justify-self: center;
        align-self: center;
      }
      .item-3 {
        /* width: 300px; */
        /* grid-column: 1 / 3;
        grid-row: 2 / 4; */
        grid-area: 2 / 1 / 4 / 3;
        /* aspect-ratio: 6 / 2; */
      }
      .container-z-index {
        width: 300px;
        height: 200px;
        border: 1px solid;
        margin: 100px auto;
        display: flex;
        position: relative;
      }
      .box {
        width: 100px;
        height: 100px;
        background-color: brown;
        border: 1px solid green;
      }
      .box-1 {
        position: absolute;
        background-color: yellow;
        left: 50px;
        top: 50px;
        z-index: 0;
      }
      .box-2 {
        opacity: 0.9;
        z-index: 1;
      }
      .box-3,
      .box-4 {
        position: absolute;
        background-color: cyan;
        width: 50px;
        height: 50px;
        left: 20px;
        top: 20px;
      }
      .box-3 {
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <h1>Day 8</h1>
    <div>
      <h2>Browse by category</h2>
      <div class="container">
        <div class="item">
          <img src="https://picsum.photos/300/200" alt="Image" />
          <span>Animals</span>
        </div>
        <div class="item item-2">
          <img src="https://picsum.photos/300/200" alt="Image" />
          <span>Art</span>
        </div>
        <div class="item item-3">
          <img src="https://picsum.photos/300/200" alt="Image" />
          <span>Beauty</span>
        </div>
        <div class="item">
          <img src="https://picsum.photos/300/200" alt="Image" />
          <span>Design</span>
        </div>
      </div>
      <div class="container-z-index">
        <div class="box box-1">
          Box 1
          <div class="box box-3">Box 3</div>
          <div class="box box-4">Box 4</div>
        </div>
        <div class="box box-2">Box 2</div>
      </div>
    </div>
  </body>
</html>
