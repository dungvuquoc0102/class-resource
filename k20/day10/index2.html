<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        padding: 0;
        box-sizing: border-box;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Oxygen,
          Ubuntu,
          Cantarell,
          "Open Sans",
          "Helvetica Neue",
          sans-serif;
      }
      .input-text {
        margin-top: 100px;
        position: relative;
        input {
          font-size: 1.5rem;
          width: 50px;
          margin-top: 16px;
          padding: 10px 15px;
          font-size: 1rem;
          border-radius: 99px;
          outline: none;
          border: 1px solid;
          transition: width linear 0.3s;
          &:focus {
            width: 150px;
          }
          &:focus + label,
          &:not(:placeholder-shown) + label {
            translate: 0 -28px;
          }
        }
        label {
          position: absolute;
          top: 60%;
          left: 12px;
          padding: 0 5px;
          background-color: #fff;
          translate: 0 -50%;
          transition: translate ease 0.3s;
          pointer-events: none;
        }
      }
      span {
        position: fixed;
        top: 0;
      }
    </style>
  </head>
  <body>
    <div class="input-text">
      <input type="text" name="username" id="username" placeholder=" " />
      <label for="username">Enter</label>
    </div>
  </body>
</html>
